<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <title>ArduPilot Firmware Webtools - Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        @keyframes metrics-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .metrics-pulse { animation: metrics-pulse 1.2s ease-in-out infinite; }
    </style>
</head>
<body>
    <nav class="navbar bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="/static/images/ardupilot_logo.png" alt="ArduPilot" height="24" class="d-inline-block align-text-top">
                <span class="ms-2 text-white" style="font-size: 25px;">ArduPilot Firmware Webtools</span>
            </a>
            <div id="sys-metrics" class="d-flex align-items-center gap-3 text-white" style="font-size: 13px; opacity: 0.85;">
                <span id="metrics-icon"><i class="bi bi-snow text-info" style="font-size:16px"></i></span>
                <span>CPU <span id="cpu-pct">--</span>%</span>
                <span>MEM <span id="mem-pct">--</span>%</span>
                <span><i class="bi bi-play-circle me-1"></i><span id="running-count">-</span> running</span>
            </div>
            <div>
                <a href="/" class="btn btn-outline-light me-1"><i class="bi bi-hammer me-2"></i>Builder</a>
                <a href="/admin" class="btn btn-outline-light me-1 active"><i class="bi bi-gear me-2"></i>Admin</a>
                <a href="/autotest" class="btn btn-outline-light me-1"><i class="bi bi-bug me-2"></i>Tests</a>
                <a href="/status" class="btn btn-outline-light me-1"><i class="bi bi-heart-pulse me-2"></i>Status</a>
                <a href="/docs" class="btn btn-outline-light me-1"><i class="bi bi-book me-2"></i>Docs</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-3 py-3">
        <!-- Actions bar -->
        <div class="d-flex justify-content-end gap-2 mb-3">
            <button class="btn btn-warning" onclick="refreshRemotes()"><i class="bi bi-arrow-clockwise me-2"></i>Reload CustomBuild</button>
        </div>

        <!-- Add Remote -->
        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-plus-circle me-2"></i><strong>Add Remote</strong></span>
            </div>
            <div class="card-body">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="newRemoteName" placeholder="e.g. jack7169">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Git URL</label>
                        <input type="text" class="form-control" id="newRemoteUrl" placeholder="https://github.com/user/ardupilot.git">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-success w-100" onclick="addRemote()"><i class="bi bi-plus me-1"></i>Add Remote</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Remotes List -->
        <div id="remotes-container"></div>
    </div>

    <!-- Add Vehicle Modal -->
    <div class="modal fade" id="addVehicleModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Vehicle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="addVehicleRemote">
                    <div class="mb-3">
                        <label class="form-label">Vehicle Type</label>
                        <select class="form-select" id="addVehicleName">
                            <option value="Copter">Copter</option>
                            <option value="Plane">Plane</option>
                            <option value="Rover">Rover</option>
                            <option value="Sub">Sub</option>
                            <option value="Tracker">Tracker</option>
                            <option value="Blimp">Blimp</option>
                            <option value="AP_Periph">AP_Periph</option>
                        </select>
                    </div>
                    <hr>
                    <h6>Initial Release</h6>
                    <div class="mb-2">
                        <label class="form-label">Release Type</label>
                        <input type="text" class="form-control" id="addVehicleReleaseType" value="Custom">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Version Number</label>
                        <input type="text" class="form-control" id="addVehicleVersion" value="Custom">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Commit Reference (tag, branch, or SHA)</label>
                        <input type="text" class="form-control" id="addVehicleCommitRef" placeholder="refs/heads/master">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-success" onclick="submitAddVehicle()">Add Vehicle</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Release Modal -->
    <div class="modal fade" id="addReleaseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Release</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="addReleaseRemote">
                    <input type="hidden" id="addReleaseVehicle">
                    <div class="mb-2">
                        <label class="form-label">Release Type</label>
                        <input type="text" class="form-control" id="addReleaseType" value="Custom">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Version Number</label>
                        <input type="text" class="form-control" id="addReleaseVersion" value="Custom">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Commit Reference (tag, branch, or SHA)</label>
                        <input type="text" class="form-control" id="addReleaseCommitRef" placeholder="refs/heads/master">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Artifacts URL (optional)</label>
                        <input type="text" class="form-control" id="addReleaseArtifactsUrl">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-success" onclick="submitAddRelease()">Add Release</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Copy Releases Modal -->
    <div class="modal fade" id="copyReleasesModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="copyReleasesTitle">Copy Releases</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="copySrcRemote">
                    <input type="hidden" id="copySrcVehicle">
                    <input type="hidden" id="copySrcReleaseIdx">
                    <div class="mb-3">
                        <label class="form-label">Target Remote</label>
                        <select class="form-select" id="copyTargetRemote" onchange="updateCopyVehicleOptions()"></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Target Vehicle</label>
                        <select class="form-select" id="copyTargetVehicle">
                            <option value="Copter">Copter</option>
                            <option value="Plane">Plane</option>
                            <option value="Rover">Rover</option>
                            <option value="Sub">Sub</option>
                            <option value="Tracker">Tracker</option>
                            <option value="Blimp">Blimp</option>
                            <option value="AP_Periph">AP_Periph</option>
                        </select>
                    </div>
                    <div class="alert alert-info small mb-0" id="copyPreview"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="submitCopyReleases()"><i class="bi bi-clipboard me-1"></i>Copy</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Release Modal -->
    <div class="modal fade" id="editReleaseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Release</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editReleaseRemote">
                    <input type="hidden" id="editReleaseVehicle">
                    <input type="hidden" id="editReleaseIdx">
                    <div class="mb-2">
                        <label class="form-label">Release Type</label>
                        <input type="text" class="form-control" id="editReleaseType">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Version Number</label>
                        <input type="text" class="form-control" id="editReleaseVersion">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Commit Reference (tag, branch, or SHA)</label>
                        <input type="text" class="form-control" id="editReleaseCommitRef">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Artifacts URL (optional)</label>
                        <input type="text" class="form-control" id="editReleaseArtifactsUrl">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="submitEditRelease()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Remote Modal -->
    <div class="modal fade" id="editRemoteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Remote</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editRemoteOrigName">
                    <div class="mb-2">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" id="editRemoteName">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Git URL</label>
                        <input type="text" class="form-control" id="editRemoteUrl">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" onclick="submitEditRemote()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        const API = '/admin/api';
        let remotesData = [];
        let validationData = {};

        async function fetchAndRender() {
            const resp = await fetch(`${API}/remotes`);
            remotesData = await resp.json();
            renderRemotes();
            validateAll();
        }

        async function validateAll() {
            try {
                const resp = await fetch(`${API}/validate`);
                validationData = await resp.json();
                renderRemotes();
            } catch (e) {
                console.warn('Validation failed:', e);
            }
        }

        function refValidationBadge(remoteName, vehicleName, idx) {
            const rd = validationData[remoteName];
            if (!rd) return '';
            if (!rd.url_ok) return ' <i class="bi bi-exclamation-triangle text-danger" title="Remote unreachable"></i>';
            const vd = rd.vehicles && rd.vehicles[vehicleName];
            if (!vd) return '';
            const entry = vd.find(e => e.index === idx);
            if (!entry) return '';
            return entry.valid
                ? ' <i class="bi bi-check-circle text-success" title="Ref found"></i>'
                : ' <i class="bi bi-exclamation-triangle text-warning" title="Ref not found on remote"></i>';
        }

        function renderRemotes() {
            const container = document.getElementById('remotes-container');
            if (remotesData.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No remotes configured. Add one above.</div>';
                return;
            }
            container.innerHTML = remotesData.map(remote => `
                <div class="card mb-3">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <div>
                            <i class="bi bi-git me-2"></i>
                            <strong>${esc(remote.name)}</strong>
                            <a href="${esc(remote.url).replace('.git','')}" target="_blank" class="text-muted ms-2"><i class="bi bi-github me-1"></i>${esc(remote.url)}</a>
                            ${validationData[remote.name] ? (validationData[remote.name].url_ok ? '<span class="badge bg-success ms-2">reachable</span>' : '<span class="badge bg-danger ms-2">' + esc(validationData[remote.name].error || 'unreachable') + '</span>') : ''}
                        </div>
                        <div>
                            <button class="btn btn-sm btn-outline-primary me-1" onclick="showEditRemote('${esc(remote.name)}')">
                                <i class="bi bi-pencil me-1"></i>Edit
                            </button>
                            <button class="btn btn-sm btn-outline-success me-1" onclick="showAddVehicle('${esc(remote.name)}')">
                                <i class="bi bi-plus me-1"></i>Vehicle
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteRemote('${esc(remote.name)}')">
                                <i class="bi bi-trash me-1"></i>Remove
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        ${(remote.vehicles || []).filter(v => (v.releases || []).length > 0).map(vehicle => `
                            <div class="border-bottom px-3 py-2">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <strong><i class="bi bi-airplane me-2"></i>${esc(vehicle.name)}</strong>
                                    <div>
                                        <button class="btn btn-sm btn-outline-secondary me-1" onclick="showCopyVehicle('${esc(remote.name)}', '${esc(vehicle.name)}')">
                                            <i class="bi bi-clipboard me-1"></i>Copy All
                                        </button>
                                        <button class="btn btn-sm btn-outline-success me-1" onclick="showAddRelease('${esc(remote.name)}', '${esc(vehicle.name)}')">
                                            <i class="bi bi-plus me-1"></i>Release
                                        </button>
                                        <button class="btn btn-sm btn-outline-danger" onclick="deleteVehicle('${esc(remote.name)}', '${esc(vehicle.name)}')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </div>
                                <table class="table table-sm table-hover mb-0">
                                    <thead class="table-dark">
                                        <tr><th>Type</th><th>Version</th><th>Commit/Ref</th><th>Artifacts</th><th></th></tr>
                                    </thead>
                                    <tbody>
                                        ${(vehicle.releases || []).map((rel, idx) => `
                                            <tr>
                                                <td>${esc(rel.release_type)}</td>
                                                <td>${esc(rel.version_number)}</td>
                                                <td><code>${esc(rel.commit_reference)}</code>${refValidationBadge(remote.name, vehicle.name, idx)}</td>
                                                <td>${rel.ap_build_artifacts_url ? `<a href="${esc(rel.ap_build_artifacts_url)}" target="_blank" class="text-truncate d-inline-block" style="max-width:200px">${esc(rel.ap_build_artifacts_url)}</a>` : '<span class="text-muted">-</span>'}</td>
                                                <td>
                                                    <button class="btn btn-sm btn-outline-secondary me-1" onclick="showCopyRelease('${esc(remote.name)}', '${esc(vehicle.name)}', ${idx})" title="Copy to..."><i class="bi bi-clipboard"></i></button>
                                                    <button class="btn btn-sm btn-outline-primary me-1" onclick="showEditRelease('${esc(remote.name)}', '${esc(vehicle.name)}', ${idx})"><i class="bi bi-pencil"></i></button>
                                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteRelease('${esc(remote.name)}', '${esc(vehicle.name)}', ${idx})"><i class="bi bi-x"></i></button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        `).join('')}
                        ${(remote.vehicles || []).filter(v => (v.releases || []).length > 0).length === 0 ? '<div class="px-3 py-2 text-muted">No vehicles with releases configured</div>' : ''}
                    </div>
                </div>
            `).join('');
        }

        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        async function apiCall(method, path, body) {
            const opts = { method, headers: {'Content-Type': 'application/json'} };
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(`${API}${path}`, opts);
            if (!resp.ok) {
                const err = await resp.json();
                alert(err.detail || 'Request failed');
                return null;
            }
            const data = await resp.json();
            remotesData = data.remotes || remotesData;
            renderRemotes();
            validateAll();
            return data;
        }

        async function addRemote() {
            const name = document.getElementById('newRemoteName').value.trim();
            const url = document.getElementById('newRemoteUrl').value.trim();
            if (!name || !url) return alert('Name and URL are required');
            await apiCall('POST', '/remotes', { name, url, vehicles: [] });
            document.getElementById('newRemoteName').value = '';
            document.getElementById('newRemoteUrl').value = '';
        }

        async function deleteRemote(name) {
            if (!confirm(`Delete remote "${name}" and all its vehicles?`)) return;
            await apiCall('DELETE', `/remotes/${encodeURIComponent(name)}`);
        }

        function showAddVehicle(remoteName) {
            document.getElementById('addVehicleRemote').value = remoteName;
            new bootstrap.Modal(document.getElementById('addVehicleModal')).show();
        }

        async function submitAddVehicle() {
            const remoteName = document.getElementById('addVehicleRemote').value;
            const vehicleName = document.getElementById('addVehicleName').value;
            const commitRef = document.getElementById('addVehicleCommitRef').value.trim();
            if (!commitRef) return alert('Commit reference is required');
            await apiCall('POST', `/remotes/${encodeURIComponent(remoteName)}/vehicles`, {
                name: vehicleName,
                releases: [{
                    release_type: document.getElementById('addVehicleReleaseType').value.trim(),
                    version_number: document.getElementById('addVehicleVersion').value.trim(),
                    commit_reference: commitRef,
                }]
            });
            bootstrap.Modal.getInstance(document.getElementById('addVehicleModal')).hide();
        }

        async function deleteVehicle(remoteName, vehicleName) {
            if (!confirm(`Delete vehicle "${vehicleName}" from "${remoteName}"?`)) return;
            await apiCall('DELETE', `/remotes/${encodeURIComponent(remoteName)}/vehicles/${encodeURIComponent(vehicleName)}`);
        }

        function showAddRelease(remoteName, vehicleName) {
            document.getElementById('addReleaseRemote').value = remoteName;
            document.getElementById('addReleaseVehicle').value = vehicleName;
            new bootstrap.Modal(document.getElementById('addReleaseModal')).show();
        }

        async function submitAddRelease() {
            const remoteName = document.getElementById('addReleaseRemote').value;
            const vehicleName = document.getElementById('addReleaseVehicle').value;
            const commitRef = document.getElementById('addReleaseCommitRef').value.trim();
            if (!commitRef) return alert('Commit reference is required');
            const body = {
                release_type: document.getElementById('addReleaseType').value.trim(),
                version_number: document.getElementById('addReleaseVersion').value.trim(),
                commit_reference: commitRef,
            };
            const artifactsUrl = document.getElementById('addReleaseArtifactsUrl').value.trim();
            if (artifactsUrl) body.ap_build_artifacts_url = artifactsUrl;
            await apiCall('POST', `/remotes/${encodeURIComponent(remoteName)}/vehicles/${encodeURIComponent(vehicleName)}/releases`, body);
            bootstrap.Modal.getInstance(document.getElementById('addReleaseModal')).hide();
        }

        async function deleteRelease(remoteName, vehicleName, idx) {
            if (!confirm('Delete this release?')) return;
            await apiCall('DELETE', `/remotes/${encodeURIComponent(remoteName)}/vehicles/${encodeURIComponent(vehicleName)}/releases/${idx}`);
        }

        function showEditRemote(remoteName) {
            const remote = remotesData.find(r => r.name === remoteName);
            if (!remote) return;
            document.getElementById('editRemoteOrigName').value = remoteName;
            document.getElementById('editRemoteName').value = remote.name;
            document.getElementById('editRemoteUrl').value = remote.url;
            new bootstrap.Modal(document.getElementById('editRemoteModal')).show();
        }

        async function submitEditRemote() {
            const origName = document.getElementById('editRemoteOrigName').value;
            const remote = remotesData.find(r => r.name === origName);
            if (!remote) return;
            const body = {
                name: document.getElementById('editRemoteName').value.trim(),
                url: document.getElementById('editRemoteUrl').value.trim(),
                vehicles: remote.vehicles || [],
            };
            if (!body.name || !body.url) return alert('Name and URL are required');
            await apiCall('PUT', `/remotes/${encodeURIComponent(origName)}`, body);
            bootstrap.Modal.getInstance(document.getElementById('editRemoteModal')).hide();
        }

        function showEditRelease(remoteName, vehicleName, idx) {
            const remote = remotesData.find(r => r.name === remoteName);
            if (!remote) return;
            const vehicle = (remote.vehicles || []).find(v => v.name === vehicleName);
            if (!vehicle) return;
            const rel = (vehicle.releases || [])[idx];
            if (!rel) return;
            document.getElementById('editReleaseRemote').value = remoteName;
            document.getElementById('editReleaseVehicle').value = vehicleName;
            document.getElementById('editReleaseIdx').value = idx;
            document.getElementById('editReleaseType').value = rel.release_type;
            document.getElementById('editReleaseVersion').value = rel.version_number;
            document.getElementById('editReleaseCommitRef').value = rel.commit_reference;
            document.getElementById('editReleaseArtifactsUrl').value = rel.ap_build_artifacts_url || '';
            new bootstrap.Modal(document.getElementById('editReleaseModal')).show();
        }

        async function submitEditRelease() {
            const remoteName = document.getElementById('editReleaseRemote').value;
            const vehicleName = document.getElementById('editReleaseVehicle').value;
            const idx = document.getElementById('editReleaseIdx').value;
            const commitRef = document.getElementById('editReleaseCommitRef').value.trim();
            if (!commitRef) return alert('Commit reference is required');
            const body = {
                release_type: document.getElementById('editReleaseType').value.trim(),
                version_number: document.getElementById('editReleaseVersion').value.trim(),
                commit_reference: commitRef,
            };
            const artifactsUrl = document.getElementById('editReleaseArtifactsUrl').value.trim();
            if (artifactsUrl) body.ap_build_artifacts_url = artifactsUrl;
            await apiCall('PUT', `/remotes/${encodeURIComponent(remoteName)}/vehicles/${encodeURIComponent(vehicleName)}/releases/${idx}`, body);
            bootstrap.Modal.getInstance(document.getElementById('editReleaseModal')).hide();
        }

        function populateCopyRemoteDropdown() {
            const sel = document.getElementById('copyTargetRemote');
            sel.innerHTML = remotesData.map(r => `<option value="${esc(r.name)}">${esc(r.name)}</option>`).join('');
        }

        function updateCopyVehicleOptions() {
            // Optionally pre-select an existing vehicle on the target remote
        }

        function showCopyVehicle(remoteName, vehicleName) {
            document.getElementById('copySrcRemote').value = remoteName;
            document.getElementById('copySrcVehicle').value = vehicleName;
            document.getElementById('copySrcReleaseIdx').value = '';
            populateCopyRemoteDropdown();
            document.getElementById('copyTargetRemote').value = remoteName;
            const remote = remotesData.find(r => r.name === remoteName);
            const vehicle = (remote?.vehicles || []).find(v => v.name === vehicleName);
            const count = (vehicle?.releases || []).length;
            document.getElementById('copyReleasesTitle').textContent = `Copy All ${vehicleName} Releases`;
            document.getElementById('copyPreview').textContent = `Will copy ${count} release(s) to the selected target vehicle. If the vehicle doesn't exist on the target remote, it will be created.`;
            new bootstrap.Modal(document.getElementById('copyReleasesModal')).show();
        }

        function showCopyRelease(remoteName, vehicleName, idx) {
            document.getElementById('copySrcRemote').value = remoteName;
            document.getElementById('copySrcVehicle').value = vehicleName;
            document.getElementById('copySrcReleaseIdx').value = idx;
            populateCopyRemoteDropdown();
            document.getElementById('copyTargetRemote').value = remoteName;
            const remote = remotesData.find(r => r.name === remoteName);
            const vehicle = (remote?.vehicles || []).find(v => v.name === vehicleName);
            const rel = (vehicle?.releases || [])[idx];
            document.getElementById('copyReleasesTitle').textContent = 'Copy Release';
            document.getElementById('copyPreview').textContent = `Will copy "${rel?.version_number}" (${rel?.commit_reference}) to the selected target.`;
            new bootstrap.Modal(document.getElementById('copyReleasesModal')).show();
        }

        async function submitCopyReleases() {
            const srcRemote = document.getElementById('copySrcRemote').value;
            const srcVehicle = document.getElementById('copySrcVehicle').value;
            const releaseIdx = document.getElementById('copySrcReleaseIdx').value;
            const targetRemote = document.getElementById('copyTargetRemote').value;
            const targetVehicle = document.getElementById('copyTargetVehicle').value;

            const remote = remotesData.find(r => r.name === srcRemote);
            const vehicle = (remote?.vehicles || []).find(v => v.name === srcVehicle);
            if (!vehicle) return alert('Source vehicle not found');

            const releases = releaseIdx !== ''
                ? [(vehicle.releases || [])[parseInt(releaseIdx)]]
                : (vehicle.releases || []);

            if (releases.length === 0) return alert('No releases to copy');

            // Ensure target vehicle exists
            const tgtRemote = remotesData.find(r => r.name === targetRemote);
            const tgtVehicle = (tgtRemote?.vehicles || []).find(v => v.name === targetVehicle);
            if (!tgtVehicle) {
                // Create vehicle with first release, then add the rest
                await apiCall('POST', `/remotes/${encodeURIComponent(targetRemote)}/vehicles`, {
                    name: targetVehicle,
                    releases: releases.map(r => ({
                        release_type: r.release_type,
                        version_number: r.version_number,
                        commit_reference: r.commit_reference,
                        ...(r.ap_build_artifacts_url ? {ap_build_artifacts_url: r.ap_build_artifacts_url} : {}),
                    })),
                });
            } else {
                // Add releases one by one to existing vehicle
                for (const r of releases) {
                    const body = {
                        release_type: r.release_type,
                        version_number: r.version_number,
                        commit_reference: r.commit_reference,
                    };
                    if (r.ap_build_artifacts_url) body.ap_build_artifacts_url = r.ap_build_artifacts_url;
                    await apiCall('POST', `/remotes/${encodeURIComponent(targetRemote)}/vehicles/${encodeURIComponent(targetVehicle)}/releases`, body);
                }
            }

            bootstrap.Modal.getInstance(document.getElementById('copyReleasesModal')).hide();
        }

        async function refreshRemotes() {
            await apiCall('POST', '/refresh');
            alert('Reload triggered');
        }

        // Initial load
        fetchAndRender();
    </script>
    <script src="/admin/static/js/metrics.js"></script>
</body>
</html>
