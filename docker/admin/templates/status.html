<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <title>ArduPilot Firmware Webtools - Status</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        .overall-banner { border-radius: 8px; padding: 20px 24px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
        .overall-banner.operational { background: rgba(40, 167, 69, 0.15); border-left: 4px solid #28a745; color: #a3cfbb; }
        .overall-banner.degraded { background: rgba(255, 193, 7, 0.15); border-left: 4px solid #ffc107; color: #ffe08a; }
        .overall-banner.major_outage { background: rgba(220, 53, 69, 0.15); border-left: 4px solid #dc3545; color: #f1aeb5; }
        .overall-banner.loading { background: rgba(148, 163, 184, 0.1); border-left: 4px solid #94a3b8; color: #94a3b8; }
        .overall-icon { font-size: 24px; }
        .overall-text { font-size: 18px; font-weight: 600; }

        .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #8b949e; margin-bottom: 12px; }

        .service-list { background: #212529; border-radius: 8px; border: 1px solid #373b3e; overflow: hidden; margin-bottom: 32px; }
        .service-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #2b3035; transition: background 0.1s; }
        .service-row:last-child { border-bottom: none; }
        .service-row:hover { background: #2b3035; }

        .service-info { flex: 1; }
        .service-name { font-size: 15px; font-weight: 500; color: #dee2e6; }
        .service-desc { font-size: 13px; color: #8b949e; margin-top: 2px; }

        .service-status { display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .status-dot.operational { background: #28a745; }
        .status-dot.degraded { background: #ffc107; }
        .status-dot.major_outage { background: #dc3545; }
        .status-dot.unknown { background: #94a3b8; }
        .status-dot.loading { background: #94a3b8; animation: pulse 1.5s infinite; }

        .status-label { font-size: 13px; font-weight: 500; white-space: nowrap; }
        .status-label.operational { color: #5cb85c; }
        .status-label.degraded { color: #ffcd39; }
        .status-label.major_outage { color: #e05545; }
        .status-label.unknown { color: #94a3b8; }

        .response-time { font-size: 12px; color: #6c757d; margin-left: 8px; min-width: 50px; text-align: right; }

        .status-footer { text-align: center; padding: 24px; color: #6c757d; font-size: 13px; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #373b3e; border-top-color: #6c757d; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <style>
        @keyframes metrics-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .metrics-pulse { animation: metrics-pulse 1.2s ease-in-out infinite; }
    </style>
</head>
<body>
    <nav class="navbar bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="/static/images/ardupilot_logo.png" alt="ArduPilot" height="24" class="d-inline-block align-text-top">
                <span class="ms-2 text-white" style="font-size: 25px;">ArduPilot Firmware Webtools</span>
            </a>
            <div id="sys-metrics" class="d-flex align-items-center gap-3 text-white" style="font-size: 13px; opacity: 0.85;">
                <span id="metrics-icon"><i class="bi bi-snow text-info" style="font-size:16px"></i></span>
                <span>CPU <span id="cpu-pct">--</span>%</span>
                <span>MEM <span id="mem-pct">--</span>%</span>
                <span><i class="bi bi-play-circle me-1"></i><span id="running-count">-</span> running</span>
            </div>
            <div>
                <a href="/" class="btn btn-outline-light me-1"><i class="bi bi-hammer me-2"></i>Builder</a>
                <a href="/admin" class="btn btn-outline-light me-1"><i class="bi bi-gear me-2"></i>Admin</a>
                <a href="/autotest" class="btn btn-outline-light me-1"><i class="bi bi-bug me-2"></i>Tests</a>
                <a href="/results/" class="btn btn-outline-light me-1"><i class="bi bi-clipboard-data me-2"></i>Results</a>
                <a href="/status" class="btn btn-outline-light me-1 active"><i class="bi bi-heart-pulse me-2"></i>Status</a>
                <a href="/docs" class="btn btn-outline-light me-1"><i class="bi bi-book me-2"></i>Docs</a>
            </div>
        </div>
    </nav>

    <div class="container py-4" style="max-width: 800px;">
        <div id="overall-banner" class="overall-banner loading">
            <span class="overall-icon"><span class="spinner"></span></span>
            <span class="overall-text">Checking systems...</span>
        </div>

        <div class="section-title">Components</div>
        <div id="service-list" class="service-list">
            <div class="service-row">
                <div class="service-info"><div class="service-name text-muted">Loading...</div></div>
            </div>
        </div>

        <div class="status-footer">
            <div id="checked-at"></div>
            <div>Auto-refreshes every 30 seconds</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        const STATUS_META = {
            operational:  { label: 'Operational',  bannerText: 'All Systems Operational', icon: '&#10003;' },
            degraded:     { label: 'Degraded',     bannerText: 'Some Systems Degraded', icon: '&#9888;' },
            major_outage: { label: 'Major Outage', bannerText: 'Major System Outage', icon: '&#10007;' },
            unknown:      { label: 'Unknown',      bannerText: 'Checking...', icon: '?' },
        };

        async function fetchStatus() {
            try {
                const resp = await fetch('/status/api');
                const data = await resp.json();
                renderStatus(data);
            } catch (e) {
                document.getElementById('overall-banner').className = 'overall-banner major_outage';
                document.getElementById('overall-banner').innerHTML =
                    '<span class="overall-icon">&#10007;</span><span class="overall-text">Unable to reach status API</span>';
            }
        }

        function renderStatus(data) {
            const meta = STATUS_META[data.overall] || STATUS_META.unknown;

            const banner = document.getElementById('overall-banner');
            banner.className = `overall-banner ${data.overall}`;
            banner.innerHTML = `<span class="overall-icon">${meta.icon}</span><span class="overall-text">${meta.bannerText}</span>`;

            const list = document.getElementById('service-list');
            list.innerHTML = data.services.map(svc => {
                const sm = STATUS_META[svc.status] || STATUS_META.unknown;
                const latency = svc.response_ms !== null ? `${svc.response_ms}ms` : '';
                return `<div class="service-row">
                    <div class="service-info">
                        <div class="service-name">${esc(svc.name)}</div>
                        <div class="service-desc">${esc(svc.description)}</div>
                    </div>
                    <div class="service-status">
                        <span class="response-time">${latency}</span>
                        <span class="status-dot ${svc.status}"></span>
                        <span class="status-label ${svc.status}">${sm.label}</span>
                    </div>
                </div>`;
            }).join('');

            const checkedAt = new Date(data.checked_at).toLocaleString();
            document.getElementById('checked-at').textContent = `Last checked: ${checkedAt}`;
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        fetchStatus();
        setInterval(fetchStatus, 30000);
    </script>
    <script src="/admin/static/js/metrics.js"></script>
</body>
</html>
