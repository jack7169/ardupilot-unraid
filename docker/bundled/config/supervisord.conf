[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
user=root

[program:redis]
command=redis-server --bind 127.0.0.1 --save "" --appendonly no --loglevel warning
user=redis
priority=10
autorestart=true
stdout_logfile=/var/log/supervisor/redis.log
stderr_logfile=/var/log/supervisor/redis-err.log

[program:caddy]
command=caddy run --config /etc/ardupilot/Caddyfile
priority=15
autorestart=true
stdout_logfile=/var/log/supervisor/caddy.log
stderr_logfile=/var/log/supervisor/caddy-err.log

[program:custombuild-app]
command=uvicorn main:app --host 127.0.0.1 --port 8080
directory=/app/custombuild/web
user=ardupilot
environment=
    PYTHONPATH="/app/custombuild",
    CBS_REDIS_HOST="127.0.0.1",
    CBS_REDIS_PORT="6379",
    CBS_BASEDIR="/data/custombuild-base",
    CBS_LOG_LEVEL="%(ENV_CBS_LOG_LEVEL)s",
    CBS_ENABLE_INBUILT_BUILDER="0",
    CBS_BUILD_TIMEOUT_SEC="%(ENV_CBS_BUILD_TIMEOUT_SEC)s",
    CBS_REMOTES_RELOAD_TOKEN="%(ENV_CBS_REMOTES_RELOAD_TOKEN)s",
    FORWARDED_ALLOW_IPS="*"
priority=20
autorestart=true
stdout_logfile=/var/log/supervisor/custombuild-app.log
stderr_logfile=/var/log/supervisor/custombuild-app-err.log

[program:custombuild-builder]
command=python3 -m builder
directory=/app/custombuild
user=ardupilot
environment=
    PYTHONPATH="/app/custombuild",
    CBS_REDIS_HOST="127.0.0.1",
    CBS_REDIS_PORT="6379",
    CBS_BASEDIR="/data/custombuild-base",
    CBS_LOG_LEVEL="%(ENV_CBS_LOG_LEVEL)s",
    CBS_BUILD_TIMEOUT_SEC="%(ENV_CBS_BUILD_TIMEOUT_SEC)s"
priority=30
autorestart=true
startsecs=10
stopwaitsecs=300
stdout_logfile=/var/log/supervisor/custombuild-builder.log
stderr_logfile=/var/log/supervisor/custombuild-builder-err.log

[program:admin]
command=uvicorn app:app --host 127.0.0.1 --port 8090
directory=/app/admin
user=ardupilot
environment=
    CBS_BASEDIR="/data/custombuild-base",
    BUILDLOGS_DIR="/data/buildlogs",
    CBS_APP_URL="http://127.0.0.1:8080",
    CBS_REDIS_HOST="127.0.0.1",
    AUTOTEST_URL="http://127.0.0.1:8091",
    CADDY_URL="http://127.0.0.1:8000",
    CBS_REMOTES_RELOAD_TOKEN="%(ENV_CBS_REMOTES_RELOAD_TOKEN)s"
priority=20
autorestart=true
stdout_logfile=/var/log/supervisor/admin.log
stderr_logfile=/var/log/supervisor/admin-err.log

[program:autotest]
command=uvicorn app:app --host 127.0.0.1 --port 8091
directory=/app/autotest
user=ardupilot
environment=
    AUTOTEST_WORKDIR="/data/autotest-workdir",
    AUTOTEST_RESULTS_DIR="/data/autotest-results",
    BUILDLOGS_DIR="/data/buildlogs",
    PYTHONPATH="/data/autotest-workdir/ardupilot/Tools/autotest",
    PATH="/data/autotest-workdir/ardupilot/Tools/autotest:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
priority=20
autorestart=true
startsecs=10
stopwaitsecs=600
stdout_logfile=/var/log/supervisor/autotest.log
stderr_logfile=/var/log/supervisor/autotest-err.log
