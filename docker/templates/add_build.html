<!doctype html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <title>ArduPilot Firmware Webtools</title>
    <meta name="description" content="Custom ArduPilot firmware builder with feature selection.">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" type="text/css" href="/static/styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        @keyframes metrics-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .metrics-pulse { animation: metrics-pulse 1.2s ease-in-out infinite; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>

<body onload="javascript: init()">
    <nav class="navbar bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="/static/images/ardupilot_logo.png" alt="ArduPilot" height="24" class="d-inline-block align-text-top">
                <span class="ms-2 text-white" style="font-size: 25px;">ArduPilot Firmware Webtools</span>
            </a>
            <div id="sys-metrics" class="d-flex align-items-center gap-3 text-white" style="font-size: 13px; opacity: 0.85;">
                <span id="metrics-icon"><i class="bi bi-snow text-info" style="font-size:16px"></i></span>
                <span>CPU <span id="cpu-pct">--</span>%</span>
                <span>MEM <span id="mem-pct">--</span>%</span>
                <span><i class="bi bi-play-circle me-1"></i><span id="running-count">-</span> running</span>
            </div>
            <div>
                <a href="/add_build" class="btn btn-success me-1 active"><i class="bi bi-plus-square me-2"></i>Add Build</a>
                <a href="/" class="btn btn-outline-light me-1"><i class="bi bi-hammer me-2"></i>Builder</a>
                <a href="/admin" class="btn btn-outline-light me-1"><i class="bi bi-gear me-2"></i>Admin</a>
                <a href="/autotest" class="btn btn-outline-light me-1"><i class="bi bi-bug me-2"></i>Tests</a>
                <a href="/status" class="btn btn-outline-light me-1"><i class="bi bi-heart-pulse me-2"></i>Status</a>
                <a href="/docs" class="btn btn-outline-light me-1"><i class="bi bi-book me-2"></i>Docs</a>
            </div>
        </div>
    </nav>
    <div class="container-fluid px-3 py-3">
        <div class="card">
            <div class="card-header">
              <span class="d-flex align-items-center"><i class="bi bi-hammer me-2"></i><strong>ADD NEW BUILD</strong></span>
            </div>
            <div class="card-body">
              <form id="build-form">
                <div class="row">
                    <div class="col-md-4 col-sm-6 mb-2 d-flex align-items-end">
                        <div class="container-fluid" id="vehicle_list">
                            <div class="container-fluid d-flex align-content-between">
                                <strong>Fetching Vehicles...</strong>
                                <div class="spinner-border ms-auto" role="status" aria-hidden="true"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-6 mb-2 d-flex align-items-end">
                        <div class="container-fluid" id="version_list">
                            <div class="container-fluid d-flex align-content-between">
                                <strong>Fetching versions...</strong>
                                <div class="spinner-border ms-auto" role="status" aria-hidden="true"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-12 mb-2 d-flex align-items-end">
                        <div class="container-fluid" id="board_list">
                            <div class="container-fluid d-flex align-content-between">
                                <strong>Fetching boards...</strong>
                                <div class="spinner-border ms-auto" role="status" aria-hidden="true"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <hr>
                <div class="container-fluid" id="build_options">
                    <div class="container-fluid w-25">
                        <div class="container-fluid d-flex align-content-between">
                            <strong>Fetching features...</strong>
                            <div class="spinner-border ms-auto" role="status" aria-hidden="true"></div>
                        </div>
                    </div>
                </div>
              </form>
            </div>
            <div class="card-footer">
                <div class="d-flex justify-content-between p-0">
                    <div class="d-flex align-items-center">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="check-uncheck-all" onclick="Features.checkUncheckAll(this.checked);">
                            <label class="form-check-label" for="check-uncheck-all">Check/Uncheck All</label>
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-outline-primary me-2" id="reset_def" onclick="Features.applyDefaults();"><i class="bi bi-arrow-counterclockwise me-2"></i>Reset to defaults</button>
                        <button type="submit" form="build-form" class="btn btn-primary" id="submit"><i class="bi bi-hammer me-2"></i>Generate build</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dependency check modal -->
    <div class="modal fade" id="dependencyCheckModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false" aria-labelledby="dependencyCheckModalLabel" aria-hidden="true">
        <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
            <h5 class="modal-title" id="dependencyCheckModalLabel">Attention!</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="modalCloseButton"></button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
            <div class="modal-footer">
            <button type="button" class="btn btn-danger" data-bs-dismiss="modal" id="modalDisableButton">Disable all</button>
            <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="modalCancelButton">Cancel</button>
            </div>
        </div>
        </div>
    </div>

    <script type="text/javascript" src="/static/js/add_build.js"></script>
    <script src="/admin/static/js/metrics.js"></script>
</body>
</html>
