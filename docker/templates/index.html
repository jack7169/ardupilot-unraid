<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Custom Firmware Builder</title>
    <meta name="description" content="Custom ArduPilot firmware builder with feature selection.">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" type="text/css" href="/static/styles/main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        @keyframes metrics-pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .metrics-pulse { animation: metrics-pulse 1.2s ease-in-out infinite; }
    </style>
</head>

<body class="bg-light" onload="javascript: init()">
    <div class="d-flex flex-column justify-content-between" style="height: 100vh;">
        <div>
            <nav class="navbar bg-dark">
                <div class="container-fluid">
                    <a class="navbar-brand" href="/">
                        <img src="/static/images/ardupilot_logo.png" alt="ArduPilot" height="24" class="d-inline-block align-text-top">
                        <span class="ms-2 text-white" style="font-size: 25px;">carthagenas</span>
                    </a>
                    <div id="sys-metrics" class="d-flex align-items-center gap-3 text-white" style="font-size: 13px; opacity: 0.85;">
                        <span id="metrics-icon"><i class="bi bi-snow text-info" style="font-size:16px"></i></span>
                        <span>CPU <span id="cpu-pct">--</span>%</span>
                        <span>MEM <span id="mem-pct">--</span>%</span>
                        <span><i class="bi bi-play-circle me-1"></i><span id="running-count">-</span> running</span>
                    </div>
                    <div>
                        <a href="/add_build" class="btn btn-success me-1"><i class="bi bi-plus-square me-2"></i>Add Build</a>
                        <a href="/" class="btn btn-outline-light me-1 active"><i class="bi bi-hammer me-2"></i>Builder</a>
                        <a href="/admin" class="btn btn-outline-light me-1"><i class="bi bi-gear me-2"></i>Admin</a>
                        <a href="/autotest" class="btn btn-outline-light me-1"><i class="bi bi-bug me-2"></i>Tests</a>
                        <a href="/results/" class="btn btn-outline-light me-1"><i class="bi bi-clipboard-data me-2"></i>Results</a>
                        <a href="/status" class="btn btn-outline-light me-1"><i class="bi bi-heart-pulse me-2"></i>Status</a>
                        <a href="/docs" class="btn btn-outline-light me-1"><i class="bi bi-book me-2"></i>Docs</a>
                    </div>
                </div>
            </nav>
            <div class="container-fluid px-3 py-3" id="build_table_container">
                <div class="container-fluid d-flex align-items-center justify-content-center" style="height: 100vh;">
                    <div class="container-fluid w-25 d-flex align-content-between">
                        <strong>Fetching builds...</strong>
                        <div class="spinner-border ms-auto" role="status" aria-hidden="true"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Log Modal -->
    <div class="modal fade" id="logModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false" aria-labelledby="logModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="logModalLabel">Build log</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <textarea class="form-control" id="logTextArea" rows="30" col="100" readonly
                        style="font-family: Consolas, monaco, monospace; font-size: smaller;"></textarea>
                </div>
                <div class="modal-footer">
                    <div class="container-fluid d-flex justify-content-between">
                        <div class="d-flex align-items-center">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" id="autoScrollSwitch" checked>
                                <label class="form-check-label" for="autoScrollSwitch">Auto-Scroll</label>
                            </div>
                        </div>
                        <div class="p-2">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Features Modal -->
    <div class="modal fade" id="featureModal" tabindex="-1" aria-labelledby="featureModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="featureModalLabel">Included features</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4" id="featureModalBody"></div>
                <div class="modal-footer">
                    <div class="container-fluid d-flex justify-content-end">
                        <div class="p-2">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.3.min.js" integrity="sha256-pvPw+upLPUjgMXY0G+8O0xUf+/Im1MZjXxxgOcBQBXU=" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js" integrity="sha256-lSjKY0/srUM9BE3dPm+c4fBo1dky2v27Gdjm2uoZaL0=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js" integrity="sha384-mQ93GR66B00ZXjt0YO5KlohRA5SY2XofN4zfuZxLkoj1gXtW8ANNCe9d5Y3eG5eD" crossorigin="anonymous"></script>
    <script type="text/javascript" src="/static/js/index.js"></script>
    <script src="/admin/static/js/metrics.js"></script>
</body>

</html>
